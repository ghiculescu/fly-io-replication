# fly.toml app configuration file generated for fly-io-replication on 2026-03-27T10:32:25+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fly-io-replication'
primary_region = 'syd'
console_command = '/rails/bin/rails console'

[build]

[deploy]
  strategy = 'rolling'
  release_command = './bin/rails db:prepare'

[env]
  PORT = '3000'
  RAILS_ENV = 'production'
  RAILS_LOG_TO_STDOUT = 'true'
  RAILS_SERVE_STATIC_FILES = 'true'

[processes]
  app = "./bin/rails server"
  worker = "./bin/jobs"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 20

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  processes = ['worker']
